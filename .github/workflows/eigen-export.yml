name: Eigen export to R2

on:
  workflow_dispatch:
  schedule:
    # Daily 06:40 UTC — after typical trend batch windows; adjust in repo Settings if needed.
    - cron: "40 6 * * *"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export trends to R2 eigen-ingest
        env:
          HST_SUPABASE_URL: ${{ secrets.HST_SUPABASE_URL }}
          HST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.HST_SUPABASE_SERVICE_ROLE_KEY }}
          R2_EIGEN_INGEST_ENDPOINT: ${{ secrets.R2_EIGEN_INGEST_ENDPOINT }}
          R2_EIGEN_INGEST_BEARER_TOKEN: ${{ secrets.R2_EIGEN_INGEST_BEARER_TOKEN }}
          ENABLE_R2_EIGEN_INGEST: "true"
        run: npm run eigen:export
